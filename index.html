<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa di Buteco - Juiz de Fora</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <header>
        <h2 class="header-title">Mapa Di Buteco 🍻</h2>
        <div style="position: relative;">
            <button class="menu-btn" onclick="toggleMenu()">☰</button>
            <div id="menu" class="dropdown-menu">
                <button onclick="installApp()">📲 Instalar no Celular</button>
                <button onclick="shareApp()">📤 Compartilhar (WhatsApp)</button>
            </div>
        </div>
    </header>

    <div class="search-container">
        <input type="text" id="search-input" placeholder="Buscar bar..." onkeyup="buscarBar()">
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="script.js"></script>

</body>
</html>
